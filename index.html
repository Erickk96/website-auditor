<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Auditor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c63ff;
      --accent-dim: #3d3880;
      --text: #e8eaf0;
      --muted: #7a7f96;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--accent); }

    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 760px;
      margin: 0 auto 24px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #fff;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"], textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      width: 100%;
      height: 120px;
      resize: vertical;
      margin-bottom: 12px;
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button.primary:hover { opacity: 0.88; }
    button.primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Results */
    #results { max-width: 760px; margin: 0 auto; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
    }

    .result-header:hover { background: rgba(255,255,255,0.03); }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.up { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.warn { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .status-dot.down { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .status-dot.loading { background: var(--muted); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .result-url {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-summary {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .chevron {
      color: var(--muted);
      font-size: 0.75rem;
      transition: transform 0.2s;
    }

    .result-card.open .chevron { transform: rotate(90deg); }

    .result-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
    }

    .result-card.open .result-body { display: block; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .metric {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 1rem;
      font-weight: 600;
    }

    .metric-value.good { color: var(--green); }
    .metric-value.warn { color: var(--yellow); }
    .metric-value.bad { color: var(--red); }
    .metric-value.neutral { color: var(--text); }

    .broken-links {
      margin-top: 16px;
    }

    .broken-links h4 {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.82rem;
      word-break: break-all;
    }

    .link-badge {
      flex-shrink: 0;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .link-badge.err { background: rgba(239,68,68,0.2); color: var(--red); }
    .link-badge.ok  { background: rgba(34,197,94,0.15); color: var(--green); }
    .link-badge.skip { background: rgba(122,127,150,0.2); color: var(--muted); }

    .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 0.95rem; }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }

    #progress-section { max-width: 760px; margin: 0 auto 16px; display: none; }
    #progress-label { font-size: 0.82rem; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Website <span>Auditor</span></h1>
  <p>Check if a site is up, measure response time, verify SSL, and detect broken links.</p>
</header>

<div class="card">
  <div class="tabs">
    <button class="tab active" data-tab="single">Single URL</button>
    <button class="tab" data-tab="bulk">Bulk URLs</button>
  </div>

  <div class="panel active" id="panel-single">
    <div class="input-row">
      <input type="text" id="single-input" placeholder="https://example.com" />
      <button class="primary" id="btn-single">Audit</button>
    </div>
  </div>

  <div class="panel" id="panel-bulk">
    <p class="hint">One URL per line. Or pull every domain from your 20i account.</p>
    <textarea id="bulk-input" placeholder="https://example.com&#10;https://google.com&#10;https://github.com"></textarea>
    <div class="input-row" style="justify-content:space-between;align-items:center">
      <button class="primary" id="btn-load-20i" style="background:transparent;border:1px solid var(--accent);color:var(--accent)">Load my 20i domains</button>
      <button class="primary" id="btn-bulk">Audit All</button>
    </div>
    <p class="hint" id="load-20i-status" style="margin-top:10px;margin-bottom:0"></p>
  </div>
</div>

<div id="progress-section">
  <span id="progress-label">Auditing…</span>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
</div>

<div id="scorecard" style="display:none">
  <div class="card" style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:16px 24px">
    <div style="display:flex;gap:18px;flex-wrap:wrap;flex:1">
      <span class="score" id="score-up">✅ <strong>0</strong> up</span>
      <span class="score" id="score-err">⚠️ <strong>0</strong> errors</span>
      <span class="score" id="score-down">🔴 <strong>0</strong> down</span>
      <span class="score" id="score-ssl">🔒 <strong>0</strong> SSL</span>
      <span class="score" style="color:var(--muted)" id="score-total">of 0</span>
    </div>
    <button class="primary" id="btn-csv" style="background:transparent;border:1px solid var(--accent);color:var(--accent)">Download CSV</button>
  </div>
</div>

<div id="results">
  <p class="empty" id="empty-state">Enter a URL above and hit Audit to get started.</p>
</div>

<script>
// ── Backend API ─────────────────────────────────────────────────────────────
// Calls our own Node server, which does real HTTP/SSL/link checks server-side.
async function callAudit(url) {
  const res = await fetch('/api/audit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url })
  });
  if (!res.ok) throw new Error('Server error ' + res.status);
  return res.json();
}

// ── Tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Audit entry points ──────────────────────────────────────────────────────
document.getElementById('btn-single').addEventListener('click', () => {
  const raw = document.getElementById('single-input').value.trim();
  if (!raw) return;
  const url = normalizeUrl(raw);
  clearResults();
  auditUrls([url]);
});

document.getElementById('single-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-single').click();
});

document.getElementById('btn-bulk').addEventListener('click', () => {
  const lines = document.getElementById('bulk-input').value
    .split('\n')
    .map(l => l.trim())
    .filter(Boolean)
    .map(normalizeUrl);
  if (!lines.length) return;
  clearResults();
  auditUrls(lines);
});

function normalizeUrl(u) {
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  return u;
}

// ── Load domains from 20i ────────────────────────────────────────────────────
document.getElementById('btn-load-20i').addEventListener('click', async () => {
  const btn = document.getElementById('btn-load-20i');
  const status = document.getElementById('load-20i-status');
  btn.disabled = true;
  status.style.color = 'var(--muted)';
  status.textContent = 'Fetching domains from 20i…';

  try {
    const res = await fetch('/api/domains');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ('Error ' + res.status));

    const box = document.getElementById('bulk-input');
    const existing = box.value.trim();
    const lines = data.domains.map(d => 'https://' + d);
    box.value = (existing ? existing + '\n' : '') + lines.join('\n');

    status.style.color = 'var(--green)';
    status.textContent = `Loaded ${data.count} domain${data.count === 1 ? '' : 's'} — review the list, then Audit All.`;
  } catch (err) {
    status.style.color = 'var(--red)';
    status.textContent = err.message;
  } finally {
    btn.disabled = false;
  }
});

// Holds every result from the latest run — used by the scorecard + CSV export.
let lastResults = [];

// ── Main audit orchestrator ─────────────────────────────────────────────────
async function auditUrls(urls) {
  document.getElementById('empty-state')?.remove();
  setProgress(0, urls.length);

  lastResults = [];
  document.getElementById('scorecard').style.display = 'block';
  updateScorecard(urls.length);

  const cards = urls.map(url => createResultCard(url));
  let done = 0;

  // Throttle: process at most CONCURRENCY domains at a time so large bulk
  // lists (50+) don't fire hundreds of simultaneous requests and crash the server.
  const CONCURRENCY = 3;
  let next = 0;

  async function worker() {
    while (next < urls.length) {
      const i = next++;
      const result = await auditOne(urls[i]);
      renderResult(cards[i], result);
      lastResults.push(result);
      updateScorecard(urls.length);
      done++;
      setProgress(done, urls.length);
    }
  }

  await Promise.all(
    Array.from({ length: Math.min(CONCURRENCY, urls.length) }, worker)
  );

  hideProgress();
}

// ── Scorecard + CSV export ───────────────────────────────────────────────────
function classify(r) {
  if (r.status >= 200 && r.status < 400) return 'up';
  if (r.status === 0) return 'down';
  return 'error';
}

function hasSslIssue(r) {
  const s = r.ssl || {};
  if (s.protocol === 'http') return false;
  return s.expired || (s.valid && typeof s.daysLeft === 'number' && s.daysLeft < 14) || (!s.valid && !!s.error);
}

function updateScorecard(total) {
  const up = lastResults.filter(r => classify(r) === 'up').length;
  const err = lastResults.filter(r => classify(r) === 'error').length;
  const down = lastResults.filter(r => classify(r) === 'down').length;
  const ssl = lastResults.filter(hasSslIssue).length;
  document.querySelector('#score-up strong').textContent = up;
  document.querySelector('#score-err strong').textContent = err;
  document.querySelector('#score-down strong').textContent = down;
  document.querySelector('#score-ssl strong').textContent = ssl;
  document.getElementById('score-total').textContent = `of ${total}`;
}

function csvCell(v) {
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

document.getElementById('btn-csv').addEventListener('click', () => {
  if (!lastResults.length) return;
  const header = ['URL', 'Health', 'Status', 'Status Text', 'Response (ms)', 'SSL', 'SSL Days Left', 'Diagnosis'];
  const rows = lastResults.map(r => [
    r.url,
    classify(r),
    r.status ?? '',
    r.statusText ?? '',
    r.latency ?? '',
    r.ssl?.protocol === 'http' ? 'none' : (r.ssl?.valid ? 'valid' : 'invalid'),
    r.ssl?.daysLeft ?? '',
    r.diagnosis?.label || r.error || ''
  ].map(csvCell).join(','));
  const csv = [header.join(','), ...rows].join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'website-audit.csv';
  a.click();
  URL.revokeObjectURL(a.href);
});

// ── Audit a single URL (delegates to backend) ───────────────────────────────
async function auditOne(url) {
  try {
    const data = await callAudit(url);
    return {
      url: data.finalUrl || data.url,
      status: data.status,
      statusText: httpLabel(data.status),
      latency: data.latency,
      ssl: data.ssl,
      links: data.links?.results || [],
      linksTotal: data.links?.total || 0,
      linksChecked: data.links?.checked || 0,
      redirected: data.redirected,
      server: data.server,
      error: data.error,
      diagnosis: data.diagnosis
    };
  } catch (err) {
    return {
      url, status: 0, statusText: 'Unreachable', latency: null,
      ssl: { valid: false, error: err.message }, links: [],
      linksTotal: 0, linksChecked: 0, error: err.message
    };
  }
}

function httpLabel(code) {
  const map = {
    200: 'OK', 201: 'Created', 301: 'Moved Permanently', 302: 'Found',
    400: 'Bad Request', 401: 'Unauthorized', 403: 'Forbidden',
    404: 'Not Found', 500: 'Internal Server Error', 503: 'Service Unavailable'
  };
  return map[code] || (code ? 'HTTP ' + code : 'Unreachable');
}

// ── DOM helpers ─────────────────────────────────────────────────────────────
function clearResults() {
  document.getElementById('results').innerHTML = '';
}

function createResultCard(url) {
  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="result-header">
      <span class="status-dot loading"></span>
      <span class="result-url">${escHtml(url)}</span>
      <span class="result-summary">Checking…</span>
      <span class="chevron">▶</span>
    </div>
    <div class="result-body"></div>
  `;
  card.querySelector('.result-header').addEventListener('click', () => {
    card.classList.toggle('open');
  });
  document.getElementById('results').appendChild(card);
  return card;
}

function renderResult(card, r) {
  const dot = card.querySelector('.status-dot');
  const summary = card.querySelector('.result-summary');
  const body = card.querySelector('.result-body');

  dot.className = 'status-dot ' + statusClass(r.status);
  summary.textContent = r.statusText + (r.latency != null ? ` · ${r.latency}ms` : '');

  const latencyClass = r.latency == null ? 'neutral' : r.latency < 800 ? 'good' : r.latency < 2000 ? 'warn' : 'bad';
  const statusCls = r.status >= 200 && r.status < 400 ? 'good' : r.status === 0 ? 'bad' : 'warn';

  const brokenLinks = r.links.filter(l => l.status === 'err');

  // SSL display
  const ssl = r.ssl || {};
  let sslText, sslCls;
  if (ssl.protocol === 'http') {
    sslText = 'None (HTTP)'; sslCls = 'warn';
  } else if (ssl.expired) {
    sslText = 'Expired'; sslCls = 'bad';
  } else if (ssl.valid) {
    sslText = `Valid · ${ssl.daysLeft}d left`; sslCls = ssl.daysLeft < 14 ? 'warn' : 'good';
  } else {
    sslText = ssl.error ? 'Invalid' : 'Unknown'; sslCls = 'bad';
  }

  body.innerHTML = `
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Status</div>
        <div class="metric-value ${statusCls}">${r.status || 'N/A'} ${r.statusText}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Response Time</div>
        <div class="metric-value ${latencyClass}">${r.latency != null ? r.latency + ' ms' : 'N/A'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">SSL</div>
        <div class="metric-value ${sslCls}">${sslText}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Broken Links</div>
        <div class="metric-value ${brokenLinks.length > 0 ? 'bad' : 'good'}">${brokenLinks.length} / ${r.linksChecked} checked</div>
      </div>
    </div>
    ${r.diagnosis ? `<div style="margin-top:14px;padding:12px 14px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:8px;font-size:0.85rem;color:#fca5a5"><strong>Diagnosis:</strong> ${escHtml(r.diagnosis.label)}</div>` : ''}
    ${ssl.valid && ssl.issuer ? `<p style="margin-top:12px;font-size:0.8rem;color:var(--muted)">Issuer: ${escHtml(ssl.issuer)} · Expires ${escHtml(ssl.validTo || '')}</p>` : ''}
    ${r.redirected ? `<p style="margin-top:8px;font-size:0.8rem;color:var(--muted)">↪ Redirected to ${escHtml(r.url)}</p>` : ''}
    ${r.error ? `<p style="margin-top:8px;font-size:0.8rem;color:var(--red)">${escHtml(r.error)}</p>` : ''}
    ${r.links.length ? `
    <div class="broken-links">
      <h4>Links Scanned (${r.linksChecked} of ${r.linksTotal})</h4>
      ${r.links.map(l => `
        <div class="link-item">
          <span class="link-badge ${l.status}">${l.code || 'ERR'}</span>
          <span>${escHtml(l.url)}</span>
        </div>
      `).join('')}
    </div>` : '<p style="margin-top:14px;font-size:0.85rem;color:var(--muted)">No links found or page could not be parsed.</p>'}
  `;
}

function statusClass(code) {
  if (!code || code === 0) return 'down';
  if (code >= 200 && code < 400) return 'up';
  return 'warn';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Progress ────────────────────────────────────────────────────────────────
function setProgress(done, total) {
  const sec = document.getElementById('progress-section');
  sec.style.display = 'block';
  document.getElementById('progress-label').textContent = `Auditing ${done} / ${total}…`;
  document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
}

function hideProgress() {
  document.getElementById('progress-section').style.display = 'none';
}
</script>
</body>
</html>
